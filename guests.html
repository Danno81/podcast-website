      font-weight: 600;

      { name: "Dr. Pim Cuijpers", photo: "https://www.buzzsprout.com/rails/active_storage/blobs/redirect/eyJfcmFpbHMiOnsiZGF0YSI6MTcxNjAyODA3LCJwdXIiOiJibG9iX2lkIn19--a4851d7dfa05f003353db7f67b82d3ed13afeb9f/OIP.webp", bio: "Emeritus Professor of Clinical Psychology at Vrije Universiteit Amsterdam; world-leading researcher on depression, anxiety, and digital mental health interventions; 185,000+ Google Scholar citations; 2024 APA Award for Distinguished Professional Contributions to Applied Research.", website: "https://www.pimcuijpers.com/blog/", episodes: 2, page: "pimcuijpers" },
      { name: "Dr. Scott Miller", photo: "https://www.buzzsprout.com/rails/active_storage/blobs/redirect/eyJfcmFpbHMiOnsiZGF0YSI6MTMwOTI0OTU1LCJwdXIiOiJibG9iX2lkIn19--7ad9625bb69c7e56d68d12f39b72e16eedc16fe0/download.jpeg", bio: "Founder of International Center for Clinical Excellence; conducts workshops and training; author of numerous articles and books; featured at Evolution of Psychotherapy Conference.", website: "https://www.scottdmiller.com/", episodes: 1, episodeNumbers: [6], page: "scottmiller" },
      { name: "Dr. Simon Goldberg", photo: "https://www.buzzsprout.com/rails/active_storage/blobs/redirect/eyJfcmFpbHMiOnsiZGF0YSI6MTMwOTQ0ODUzLCJwdXIiOiJibG9iX2lkIn19--13c51e236ec11a6947993710fc2d98b6fe40be98/OIP%20(1).jpeg", bio: "Associate Professor at University of Wisconsin-Madison; specializes in effectiveness of psychotherapy and digital mental health interventions; emphasis on mindfulness and meditation.", website: "https://counselingpsych.education.wisc.edu/fac-staff/goldberg-simon/", episodes: 2, page: "simongoldberg" },
      { name: "Dr. Simon Rice", photo: "https://www.buzzsprout.com/rails/active_storage/blobs/redirect/eyJfcmFpbHMiOnsiZGF0YSI6MTQ1MTE4NDc3LCJwdXIiOiJibG9iX2lkIn19--73136d1fbe1a07f811f9a57bac58ee83734fb3fe/RICE-SIMON-e1643303758375.png", bio: "Clinical psychologist and professor at University of Melbourne; Global Director of Movember Men's Health Institute; research on men's mental health, youth depression, suicide prevention.", website: "https://findanexpert.unimelb.edu.au/profile/602442-simon-rice", episodes: 1, page: "simonrice" },

      { name: "Dr. Terry Tracey", photo: "https://www.buzzsprout.com/rails/active_storage/blobs/redirect/eyJfcmFpbHMiOnsiZGF0YSI6MTMwOTI0MTc4LCJwdXIiOiJibG9iX2lkIn19--45fc5f46a2622e5544e5c3f1f316a74b7c1ac7b6/OIP.jpeg", bio: "Professor emeritus at Arizona State University; former editor-in-chief Journal of Counseling Psychology; research on client-therapist interaction, interpersonal personality models.", website: "https://search.asu.edu/profile/229363", episodes: 3, page: "terrytracey" },
      { name: "Dr. Tony Rousmaniere", photo: "https://www.buzzsprout.com/rails/active_storage/blobs/redirect/eyJfcmFpbHMiOnsiZGF0YSI6MTQ5MTY2OTE4LCJwdXIiOiJibG9iX2lkIn19--6f7463993f96b55c660756b37657579ab10adeb8/Tony-Rousmaniere.png", bio: "Clinical psychologist and researcher; President of Sentio University; scholarship on therapist training and deliberate practice; Fellow of APA.", website: "https://drtonyr.com/", episodes: 4, page: "tonyrousmaniere" },
      { name: "Dr. Ueli Kramer", photo: "https://www.buzzsprout.com/rails/active_storage/blobs/redirect/eyJfcmFpbHMiOnsiZGF0YSI6MTM1NDg0OTc0LCJwdXIiOiJibG9iX2lkIn19--0fbe68a1dbc8b25d1ea8b0336fe122fdbc4639e0/download.jpeg", bio: "Professor at University of Lausanne; directs University Institute of Psychotherapy; work centers on psychotherapy process research, with particular focus on mechanisms of change in treatments for personality disorders.", website: "https://edpub.unil.ch/interpub/noauth/php/Un/UnPers.php?PerNum=1264947&LanCode=8&menu=rech", episodes: 2, page: "uelikramer" },
      { name: "Dr. William (Bill) Stiles", photo: "https://www.buzzsprout.com/rails/active_storage/blobs/redirect/eyJfcmFpbHMiOnsiZGF0YSI6MTQwMzg3NjgxLCJwdXIiOiJibG9iX2lkIn19--bb8737d1b24d9c7f8187609fe10361a4b5ee0095/Bill_Jan_2009%20copy%202.jpeg", bio: "Professor Emeritus at Miami University; past president of APA Society for Psychotherapy and Society for Psychotherapy Research; recognized as one of fifty highest-impact psychology authors.", website: "https://wbstiles.net/", episodes: 2, page: "williamstiles" },
      { name: "Johanna Mickelson", photo: "images/mickelson.jpg", bio: "PhD student in Counselling Psychology at UBC; completed Bachelor's in Psychology and MA in Counselling Psychology at UBC; focuses research on dynamic ways therapists respond to clients' evolving needs.", website: null, episodes: 2, page: "johannamickelson" }
    ];

    // Sort guests alphabetically by last name
    GUESTS.sort((a, b) => {
      const lastName = name => name.replace(/^(Dr\.\s*|Mr\.\s*|Ms\.\s*)/i, '').trim().split(/\s+/).pop();
      return lastName(a.name).localeCompare(lastName(b.name));
    });

    function getInitials(name) {
      return name.replace(/^(Dr\.\s*|Mr\.\s*|Ms\.\s*)/i, '')
        .split(' ')
        .filter(w => w.length > 0)
        .map(w => w[0].toUpperCase())
        .slice(0, 2)
        .join('');
    }

    let allEpisodes = [];

    // Match episodes to a guest by searching episode titles for the guest's last name.
    // If the guest has an explicit episodeNumbers array, use that instead (handles name collisions).
    function matchEpisodesToGuest(guest, episodes) {
      if (guest.episodeNumbers && guest.episodeNumbers.length) {
        return episodes.filter(ep => guest.episodeNumbers.includes(ep.episodeNumber));
      }
      const cleanName = guest.name.replace(/^(Dr\.\s*|Mr\.\s*|Ms\.\s*)/i, '').trim();
      // Strip parenthetical nicknames like "(Del)" or "(Bill)"
      const nameParts = cleanName.split(/\s+/).filter(p => !p.startsWith('('));
      const lastName = nameParts[nameParts.length - 1].replace(/[.,]/g, '');
      return episodes.filter(ep => ep.title.toLowerCase().includes(lastName.toLowerCase()));
    }

    function buildEpisodeBadges(guest, episodes) {
      if (episodes.length === 0) {
        return `<span class="guest-episode-link-loading">Loading episodes…</span>`;
      }
      const matched = matchEpisodesToGuest(guest, episodes);
      if (matched.length === 0) return '';
      // Sort by episode number ascending
      const sorted = [...matched].sort((a, b) => (a.episodeNumber || 0) - (b.episodeNumber || 0));
      const links = sorted.map(ep => {
        const label = ep.episodeNumber ? `Ep. ${ep.episodeNumber}` : 'Episode';
        const epSlug = ep.audioUrl
          ? ep.audioUrl.replace('https://www.buzzsprout.com/2324798/episodes/', '').replace('.mp3', '')
          : String(ep.id);
        return `<a href="/ep/${epSlug}.html" class="guest-episode-link" title="${ep.title}">${label}</a>`;
      }).join('');
      return `<div class="guest-episode-links">${links}</div>`;
    }

    function renderGuests(guests, episodes) {
      const grid = document.getElementById('guests-grid');
      grid.innerHTML = '';

      if (guests.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>No guests match your search.</p></div>';
        return;
      }

      guests.forEach(guest => {
        const card = document.createElement('div');
        card.className = 'guest-card';

        const initials = getInitials(guest.name);
        const photoInner = guest.photo
          ? `<img class="guest-photo" src="${guest.photo}" alt="${guest.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
             <div class="guest-initials" style="display:none;">${initials}</div>`
          : `<div class="guest-initials">${initials}</div>`;

        // If this guest has an individual page, wrap the photo in an internal link.
        const photoHtml = guest.page
          ? `<a href="guests/${guest.page}.html" style="display:contents;" aria-label="View ${guest.name}'s profile">${photoInner}</a>`
          : photoInner;

        const episodeBadges = buildEpisodeBadges(guest, episodes || []);

        // Name linking: prefer internal guest page, fall back to external website.
        let nameHtml;
        if (guest.page) {
          nameHtml = `<a href="guests/${guest.page}.html" style="color: inherit; text-decoration: none; border-bottom: 1px solid var(--accent);">${guest.name}</a>`;
        } else if (guest.website) {
          nameHtml = `<a href="${guest.website}" target="_blank" style="color: inherit; text-decoration: none; border-bottom: 1px solid var(--accent);">${guest.name}</a>`;
        } else {
          nameHtml = guest.name;
        }

        // "View profile →" link for guests with dedicated pages.
        const profileLinkHtml = guest.page
          ? `<a href="guests/${guest.page}.html" class="guest-profile-link">View profile →</a>`
          : '';

        card.innerHTML = `
          ${photoHtml}
          <h3>${nameHtml}</h3>
          ${episodeBadges}
          <p class="guest-bio">${guest.bio}</p>
          ${profileLinkHtml}
        `;

        grid.appendChild(card);
      });
    }

    function handleSearch(e) {
      const query = e.target.value.trim().toLowerCase();
      if (!query) {
        renderGuests(GUESTS, allEpisodes);
        return;
      }
      const filtered = GUESTS.filter(g =>
        g.name.toLowerCase().includes(query) ||
        g.bio.toLowerCase().includes(query)
      );
      renderGuests(filtered, allEpisodes);
    }

    // Init: render immediately (no episode data yet), then fetch and re-render with links
    async function init() {
      renderGuests(GUESTS, []);
      document.getElementById('guest-search').addEventListener('input', handleSearch);
      const episodes = await fetchEpisodes();
      allEpisodes = episodes;
      renderGuests(GUESTS, allEpisodes);
    }
    init();
  </script>
